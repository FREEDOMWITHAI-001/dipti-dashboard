<style>
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: #FAFAFA;
    color: #18181B;
    font-feature-settings: 'cv11','ss01','ss03';
  }
  ::selection { background:#E0E7FF; color:#3730A3; }
  /* slim scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #E4E4E7; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #D4D4D8; background-clip: padding-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* slide-over */
  .slideover-panel { transform: translateX(100%); transition: transform .35s cubic-bezier(.2,.8,.2,1); }
  .slideover.open .slideover-panel { transform: translateX(0); }
  .slideover-backdrop { opacity: 0; transition: opacity .25s ease; }
  .slideover.open .slideover-backdrop { opacity: 1; }
  .slideover { pointer-events: none; }
  .slideover.open { pointer-events: auto; }

  /* modal */
  .modal-card { transform: translateY(8px) scale(.985); opacity: 0; transition: all .22s cubic-bezier(.2,.8,.2,1); }
  .modal.open .modal-card { transform: translateY(0) scale(1); opacity: 1; }
  .modal-backdrop { opacity: 0; transition: opacity .2s ease; }
  .modal.open .modal-backdrop { opacity: 1; }
  .modal { pointer-events: none; }
  .modal.open { pointer-events: auto; }

  /* toasts */
  .toast { transform: translateY(8px); opacity: 0; transition: all .25s cubic-bezier(.2,.8,.2,1); }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* presence pulse */
  @keyframes presencePulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,.55); } 50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); } }
  .presence-dot { animation: presencePulse 2s ease-out infinite; }

  /* recording pulse */
  @keyframes recPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: .55; } }
  .rec-pulse { animation: recPulse 1.1s ease-in-out infinite; }

  /* tab underline */
  .tab-underline { position: relative; }
  .tab-underline[data-active="true"]::after {
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:#18181B; border-radius:2px;
  }

  /* row clickable */
  .row-clickable { transition: background-color .12s ease; cursor: pointer; }
  .row-clickable:hover { background:#FAFAFA; }

  /* briefing card */
  .briefing-card {
    background:
      radial-gradient(80% 120% at 0% 0%, rgba(99,102,241,.06) 0%, rgba(99,102,241,0) 60%),
      linear-gradient(180deg, #FFFFFF 0%, #FCFCFD 100%);
    border: 1px solid #ECECEE;
    box-shadow: 0 1px 2px rgba(16,24,40,.03);
  }
  .briefing-divider { background: linear-gradient(90deg, rgba(228,228,231,0) 0%, rgba(228,228,231,1) 12%, rgba(228,228,231,1) 88%, rgba(228,228,231,0) 100%); }

  /* skeleton shimmer */
  @keyframes shimmer { 0%{ background-position: -400px 0; } 100%{ background-position: 400px 0; } }
  .skeleton { background: linear-gradient(90deg,#F4F4F5 0%,#FAFAFA 50%,#F4F4F5 100%); background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px; }

  /* avatar colors deterministic by initial */
  .av-AK { background:#FEF2F2; color:#9F1239; }
  .av-DV { background:#EFF6FF; color:#1E3A8A; }
  .av-FM { background:#F0FDF4; color:#14532D; }
  .av-S  { background:#F5F3FF; color:#4338CA; }

  /* keyboard kbd */
  kbd { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 6px; border:1px solid #E4E4E7; border-bottom-width:2px; border-radius: 5px; background:#FFF; color:#52525B; }

  /* status dots */
  .dot { width:6px; height:6px; border-radius:999px; display:inline-block; }

  /* hide scrollbar in horizontal tabs */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* button shimmer on primary */
  .btn-primary {
    background: linear-gradient(180deg, #5048E5 0%, #4338CA 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 1px 2px rgba(67,56,202,.4);
  }
  .btn-primary:hover { background: linear-gradient(180deg, #4F46E5 0%, #3F36C8 100%); }
  .btn-primary:active { transform: translateY(1px); }
</style>

const $ = (sel, root=document) => root.querySelector(sel);

const fmtINR = n => '₹' + n.toLocaleString('en-IN');
const initials = (f,l) => (f[0]||'')+(l[0]||'');

function statusPill(status) {
  const map = {
    active:    ['Active', 'bg-emerald-50 text-emerald-700 ring-emerald-100'],
    expiring:  ['Expiring soon','bg-amber-50 text-amber-800 ring-amber-100'],
    expired:   ['Expired',  'bg-ink-100 text-ink-600 ring-ink-200'],
    due_soon:  ['Due soon', 'bg-amber-50 text-amber-800 ring-amber-100'],
    overdue:   ['Overdue',  'bg-rose-50 text-rose-700 ring-rose-100'],
    upcoming:  ['Upcoming', 'bg-ink-100 text-ink-600 ring-ink-200'],
    paid:      ['Paid',     'bg-accent-50 text-accent-700 ring-accent-100'],
  };
  const [label, cls] = map[status] || ['—','bg-ink-100 text-ink-600 ring-ink-200'];
  return `<span class="inline-flex items-center gap-1.5 text-[11.5px] font-medium px-2 py-0.5 rounded-full ring-1 ring-inset ${cls}"><span class="dot ${cls.includes('emerald')?'bg-emerald-500':cls.includes('amber')?'bg-amber-500':cls.includes('rose')?'bg-rose-500':cls.includes('accent')?'bg-accent-500':'bg-ink-400'}"></span>${label}</span>`;
}

function avatar(coachKey, size=28) {

}

function studentAvatar(s, size=32) {
  return `<div class="rounded-full av-S grid place-items-center font-semibold" style="width:${size}px;height:${size}px;font-size:${size*0.4}px">${initials(s.first,s.last).toUpperCase()}</div>`;

/* ================ NAV / VIEW ROUTING ================ */
const VIEWS = {};
function showView(name) {
  $$('.nav-item').forEach(b => {
    const active = b.dataset.view === name;
    b.classList.toggle('bg-ink-100', active);
    b.classList.toggle('text-ink-900', active);
    b.classList.toggle('font-medium', active);
    b.classList.toggle('text-ink-700', !active);
  });
  $('#view-container').innerHTML = (VIEWS[name] || VIEWS.students)();
  lucide.createIcons();
  // bind

function paymentsTab(s) {

/* ================ TOASTS ================ */
function toast(message, type='info') {
  const ic = type==='success'?'check-circle':type==='error'?'x-circle':'info';
  const cls = type==='success'?'border-emerald-200 bg-emerald-50 text-emerald-900':type==='error'?'border-rose-200 bg-rose-50 text-rose-900':'border-ink-200 bg-white';
  const el = document.createElement('div');
  el.className = `toast border ${cls} shadow-pop rounded-xl px-4 py-3 flex items-center gap-3 text-[13px] font-medium`;
  el.innerHTML = `<i data-lucide="${ic}" class="w-4 h-4"></i><span>${message}</span>`;
  $('#toasts').appendChild(el);
  lucide.createIcons();
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(()=>el.remove(), 300); }, 3200);
}

/* ================ VOICE SIMULATION ================ */
function simulateVoice(btn) {
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500 rec-pulse"></span> Listening… <span class="font-mono">0:03</span>`;
  let s = 3;
  const t = setInterval(() => {
    s++;
    btn.querySelector('span:last-child').textContent = `0:0${s}`;
    if (s >= 6) {
      clearInterval(t);
      btn.innerHTML = `<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> Transcribing…`;
      lucide.createIcons();
      setTimeout(() => {
        const ta = $('#call-textarea');
        if (ta) ta.value = (ta.value ? ta.value+'\n\n' : '') + 'Connected with student. Spoke about WhatsApp marketing — she is ready to push a 7-day plan starting Monday.';
        btn.innerHTML = original;
        btn.disabled = false;
        lucide.createIcons();
        toast('Transcribed via Whisper · 6 sec audio', 'success');
      }, 900);
    }
  }, 1000);
}

    ${list}
    <div class="px-4 py-1.5 mt-2 text-[10.5px] uppercase tracking-wider text-ink-400 font-semibold">Quick actions</div>
    <button onclick="closeCmdk(); showView('emi')" class="w-full text-left px-4 py-2.5 hover:bg-ink-50 flex items-center gap-3 text-[13.5px]"><i data-lucide="indian-rupee" class="w-4 h-4 text-ink-500"></i> Open EMI Tracker</button>
    <button onclick="closeCmdk(); showView('reminders')" class="w-full text-left px-4 py-2.5 hover:bg-ink-50 flex items-center gap-3 text-[13.5px]"><i data-lucide="bell-ring" class="w-4 h-4 text-ink-500"></i> Configure reminders</button>
  `;
  lucide.createIcons();
  $('#cmdk').classList.add('open');
  setTimeout(() => $('#cmdk-input').focus(), 50);
}
function closeCmdk() { $('#cmdk').classList.remove('open'); }
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmdk(); }
  if (e.key === 'Escape') { closeStudent(); closeModal(); closeCmdk(); }
});

/* ================ INIT ================ */
showView('students');
lucide.createIcons();

// Friendly first-run toast
setTimeout(() => toast('Click any student row to see the slide-over · ⌘K to search', 'info'), 600);
</script>
</body>
</html>
